<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITH Server - Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #10b981;
            --accent-hover: #059669;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
        }

        .logo {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .badge {
            display: inline-block;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-top: 0.5rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo">LITH</h1>
        <span class="badge">v1.0.5 - Secured</span>
        
        <h2>Your C server is working!</h2>
        <p>The lightweight HTTP server intercepted your request, parsed the headers, and successfully returned this HTML file. Directory traversal protection is enabled.</p>
        
        <a href="https://github.com/fomadev/lith" target="_blank" class="btn">View on GitHub</a>
        
        <footer>
            Powered by LITH's multi-threaded engine
        </footer>
    </div>

</body>
</html>
