<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITH Server · Interface</title>
    
    <!-- Font Awesome 6 (gratuit) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Logo avec icône -->
        <div class="logo-wrapper">
            <i class="fas fa-bolt logo-icon"></i>
            <span class="logo">LITH</span>
        </div>
        
        <span class="badge">
            <i class="fas fa-shield-alt"></i> v1.0.9 · Secured
        </span>
        
        <h2>
            <i class="fas fa-check-circle" style="color: var(--accent); margin-right: 8px;"></i>
            Server is operational
        </h2>
        
        <p>
            <i class="fas fa-server" style="color: var(--text-muted); margin-right: 6px;"></i>
            The lightweight HTTP server intercepted your request, parsed the headers, 
            and successfully returned this HTML file. Directory traversal protection is enabled.
        </p>
        
        <div class="btn-group">
            <a href="https://github.com/fomadev/lith" target="_blank" class="btn btn-primary">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="dashboard.html" class="btn btn-secondary">
                <i class="fas fa-chart-pie"></i> Dashboard
            </a>
        </div>
        
        <footer>
            <i class="fas fa-cogs"></i> Powered by LITH's multi-threaded engine
        </footer>
    </div>

</body>
</html>
