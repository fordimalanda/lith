name: Functional Test Suite

on:
  push:
    branches: [ "main", "test-suite" ]
  pull_request:
    branches: [ "main", "test-suite" ]
  workflow_dispatch:

jobs:
  network-validation:
    name: Core & Security Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Toolchain and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential curl jq apache2-utils netcat-openbsd

    - name: Prepare Local Test Environment
      run: |
        mkdir -p bin public
        echo "<h1>LITH Functional Test Target</h1>" > public/index.html
        
        # Génération de la configuration isolée pour le conteneur de CI
        echo "PORT=8888" > lith.conf
        echo "PUBLIC_DIR=public" >> lith.conf

    - name: Build LITH Engine
      run: make

    - name: Execute Network Test Suite
      shell: bash
      run: |
        # 1. Démarrage du serveur en arrière-plan
        ./bin/lith &
        SERVER_PID=$!
        
        # Laisser le temps au socket de faire son bind()
        sleep 1
        
        echo "=================================================="
        echo " TEST 1: Validation HTTP GET (Static Files) "
        echo "=================================================="
        GET_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/)
        if [ "$GET_STATUS" -eq 200 ]; then
          echo "✅ GET Success: Server responded with HTTP 200"
        else
          echo "❌ GET Failure: Expected 200, got $GET_STATUS"
          kill $SERVER_PID; exit 1
        fi

        echo "=================================================="
        echo " TEST 2: Validation HTTP POST (Engine v1.0.5) "
        echo "=================================================="
        POST_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d '{"test":"ci_payload"}' http://localhost:8888/api/test)
        
        STATUS_JSON=$(echo "$POST_RESPONSE" | jq -r '.status' 2>/dev/null)
        BYTES_JSON=$(echo "$POST_RESPONSE" | jq -r '.bytes_processed' 2>/dev/null)
        
        if [ "$STATUS_JSON" = "success" ] && [ "$BYTES_JSON" = "21" ]; then
          echo "✅ POST Success: Payload processed correctly ($BYTES_JSON bytes)"
        else
          echo "❌ POST Failure: Malformed server response"
          echo "Response received: $POST_RESPONSE"
          kill $SERVER_PID; exit 1
        fi

        echo "=================================================="
        echo " TEST 3: Security - Directory Traversal Barrier "
        echo "=================================================="
        # L'option --path-as-is force curl à envoyer les '../' sans les résoudre localement.
        SEC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --path-as-is http://localhost:8888/../../etc/passwd)
        if [ "$SEC_STATUS" -eq 400 ] || [ "$SEC_STATUS" -eq 403 ] || [ "$SEC_STATUS" -eq 404 ]; then
          echo "✅ Security Guard Success: Traversal blocked or mitigated with HTTP $SEC_STATUS"
        else
          echo "🚨 SECURITY ALERT: Path traversal vulnerability discovered! Status: $SEC_STATUS"
          kill $SERVER_PID; exit 1
        fi

        echo "=================================================="
        echo " 🏋️ TEST 4: Stress & File Descriptor Leak Testing "
        echo "=================================================="
        INITIAL_FD_COUNT=$(ls /proc/$SERVER_PID/fd | wc -l)
        echo "Initial open File Descriptors: $INITIAL_FD_COUNT"
        
        echo "Bombarding server with 200 rapid requests (100 GET + 100 POST)..."
        for i in {1..100}; do
          curl -s http://localhost:8888/index.html -o /dev/null
          curl -s -X POST -H "Content-Type: application/json" -d '{"stress":"test"}' http://localhost:8888/api/test -o /dev/null
        done
        
        sleep 1
        
        FINAL_FD_COUNT=$(ls /proc/$SERVER_PID/fd | wc -l)
        echo "Final open File Descriptors: $FINAL_FD_COUNT"
        
        if [ "$FINAL_FD_COUNT" -gt "$INITIAL_FD_COUNT" ]; then
          echo "❌ CRITICAL FAULT: Resource leak detected! Sockets or files are remaining open."
          ls -l /proc/$SERVER_PID/fd
          kill $SERVER_PID; exit 1
        else
          echo "✅ PASSED: Structural socket sealing is perfect. Zero leaks detected."
        fi

        echo "=================================================="
        echo " 🏎️ TEST 5: Thread Concurrency & Crash Testing "
        echo "=================================================="
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "❌ CRITICAL: Server was already dead before beginning concurrency tests."; exit 1
        fi

        echo '{"bench":"concurrency_payload"}' > post_data.json

        echo "🔥 Phase A: Bombarding with 1000 concurrent GET requests (50 parallel)..."
        ab -n 1000 -c 50 http://localhost:8888/index.html

        echo "🔥 Phase B: Bombarding with 500 concurrent POST requests (25 parallel)..."
        ab -n 500 -c 25 -p post_data.json -T "application/json" http://localhost:8888/api/test

        echo "--------------------------------------------------"
        if kill -0 $SERVER_PID 2>/dev/null; then
          echo "✅ PARFAIT: LITH a survécu au bombardement multi-thread sans aucune Race Condition !"
        else
          echo "🚨 CRITIQUE: Le moteur a CRASHÉ sous la charge conjointe !"
          rm -f post_data.json
          exit 1
        fi
        rm -f post_data.json

        echo "=================================================="
        echo " 🛡️ TEST 6: Slow Connection / Timeout Resistance "
        echo "=================================================="
        START_TIME=$(date +%s)
        
        echo "Opening an inactive connection to trigger LITH's 3s timeout..."
        
        # nc lit les en-têtes via le heredoc, les pousse sur le socket, puis tombe
        # en attente d'I/O pure sans interférence de processus tiers.
        nc -w 5 localhost 8888 << EOF
        POST /api/test HTTP/1.1
        Content-Length: 100
EOF
        
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "Connection lasted for: $DURATION seconds"

        # Si le SO_RCVTIMEO (3s) fonctionne, LITH coupe. nc intercepte le FIN/RST 
        # et s'arrête instantanément (DURATION ~ 3s). 
        # Si LITH échoue, nc attend son propre timeout -w 5 (DURATION >= 5s).
        if [ "$DURATION" -ge 5 ]; then
          echo "❌ CRITICAL FAULT: LITH kept the socket open too long ($DURATIONs)! Vulnerable to Slowloris."
          kill $SERVER_PID; exit 1
        else
          echo "✅ PASSED: Socket timeout successfully triggered by LITH in $DURATION seconds."
        fi

        echo "Checking if server survived and remains operational..."
        curl -s -I http://localhost:8888/ | grep -q "200 OK" && echo "✅ Server is alive and healthy!"

        # Fin globale de la suite de tests
        echo "=================================================="
        echo " 🎉 All 6 advanced industrial tests passed successfully!"
        echo "=================================================="
        kill $SERVER_PID