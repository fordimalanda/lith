name: Functional Test Suite

on:
  push:
    branches: [ "main", "test", "test-suite" ]
  pull_request:
    branches: [ "main", "test", "test-suite" ]
  workflow_dispatch:

jobs:
  network-validation:
    name: Core & Security Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Toolchain and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential curl jq apache2-utils netcat-openbsd

    - name: Prepare Local Test Environment
      run: |
        mkdir -p bin public
        echo "<h1>LITH Functional Test Target</h1>" > public/index.html
        
        # Génération de la configuration isolée pour le conteneur de CI
        echo "PORT=8888" > lith.conf
        echo "PUBLIC_DIR=public" >> lith.conf

    - name: Build LITH Engine
      run: make

    - name: Execute Network Test Suite
      shell: bash
      run: |
        # 1. Démarrage du serveur avec la commande explicite v1.0.7
        ./bin/lith start > server_output.log 2>&1 &
        SERVER_PID=$!
        
        # Laisser le temps au socket et au Thread Pool de s'initialiser
        sleep 1
        
        echo "=================================================="
        echo " TEST 1: Validation HTTP GET (Static Files) "
        echo "=================================================="
        GET_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/)
        if [ "$GET_STATUS" -eq 200 ]; then
          echo "✅ GET Success: Server responded with HTTP 200"
        else
          echo "❌ GET Failure: Expected 200, got $GET_STATUS"
          cat server_output.log; kill -9 $SERVER_PID; exit 1
        fi

        echo "=================================================="
        echo " 🔄 TEST 1B: HTTP Keep-Alive Connection Re-use "
        echo "=================================================="
        CURL_KEEP_LOG=$(curl -v -s http://localhost:8888/index.html http://localhost:8888/index.html http://localhost:8888/index.html 2>&1)
        if echo "$CURL_KEEP_LOG" | grep -q "Re-using existing connection"; then
          echo "✅ KEEP-ALIVE PASSED: Curl successfully re-used TCP socket!"
        else
          echo "❌ KEEP-ALIVE FAULT: LITH closed the socket prematurely."
          cat server_output.log; kill -9 $SERVER_PID; exit 1
        fi

        echo "=================================================="
        echo " TEST 2: Validation HTTP POST (Engine v1.0.7) "
        echo "=================================================="
        POST_RESPONSE=$(curl -s -X POST -H "Content-Type: application/json" -d '{"test":"ci_payload"}' http://localhost:8888/api/test)
        STATUS_JSON=$(echo "$POST_RESPONSE" | jq -r '.status' 2>/dev/null)
        BYTES_JSON=$(echo "$POST_RESPONSE" | jq -r '.bytes_processed' 2>/dev/null)
        
        if [ "$STATUS_JSON" = "success" ] && [ "$BYTES_JSON" = "21" ]; then
          echo "✅ POST Success: Payload processed correctly"
        else
          echo "❌ POST Failure: Malformed response: $POST_RESPONSE"
          cat server_output.log; kill -9 $SERVER_PID; exit 1
        fi

        echo "=================================================="
        echo " TEST 3: Security - Directory Traversal Barrier "
        echo "=================================================="
        SEC_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --path-as-is http://localhost:8888/../../etc/passwd)
        if [ "$SEC_STATUS" -eq 400 ] || [ "$SEC_STATUS" -eq 403 ] || [ "$SEC_STATUS" -eq 404 ]; then
          echo "✅ Security Guard Success: Traversal blocked with HTTP $SEC_STATUS"
        else
          echo "🚨 SECURITY ALERT: Path traversal vulnerability! Status: $SEC_STATUS"
          cat server_output.log; kill -9 $SERVER_PID; exit 1
        fi

        echo "=================================================="
        echo " 🏋️ TEST 4: Stress & Parallel Concurrency Testing "
        echo "=================================================="
        INITIAL_FD_COUNT=$(ls /proc/$SERVER_PID/fd | wc -l)
        echo "Initial open File Descriptors: $INITIAL_FD_COUNT"
        
        echo "Bombarding server with rapid requests..."
        # Réduit à 20 requêtes en arrière-plan pour éviter de saturer le pool de 8 threads en CI
        for i in {1..10}; do
          curl -s -o /dev/null http://localhost:8888/index.html &
          curl -s -o /dev/null -X POST -H "Content-Type: application/json" -d '{"stress":"test"}' http://localhost:8888/api/test &
        done
        
        # Attendre la fin des curl en arrière-plan
        wait
        sleep 1
        
        FINAL_FD_COUNT=$(ls /proc/$SERVER_PID/fd | wc -l)
        echo "Final open File Descriptors: $FINAL_FD_COUNT"
        
        if [ "$FINAL_FD_COUNT" -gt "$((INITIAL_FD_COUNT + 2))" ]; then
          echo "❌ CRITICAL FAULT: Resource leak detected!"
          ls -l /proc/$SERVER_PID/fd
          cat server_output.log; kill -9 $SERVER_PID; exit 1
        else
          echo "✅ PASSED: Structural socket sealing is perfect. Zero leaks."
        fi

        echo "=================================================="
        echo " 🏎️ TEST 5: Heavy Load Multi-Thread Testing "
        echo "=================================================="
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "❌ CRITICAL: Server crashed before ApacheBench tests."; exit 1
        fi

        echo '{"bench":"concurrency_payload"}' > post_data.json
        
        # OPTIMISATION : Volume adapté pour l'environnement limité de la CI de GitHub (concurrency 5)
        # Évite que les workers tombent tous en recv-timeout en même temps
        ab -q -k -n 50 -c 5 http://localhost:8888/index.html
        ab -q -k -n 30 -c 5 -p post_data.json -T "application/json" http://localhost:8888/api/test
        rm -f post_data.json

        if kill -0 $SERVER_PID 2>/dev/null; then
          echo "✅ PARFAIT: Moteur LITH stable sous la charge ApacheBench !"
        else
          echo "🚨 CRITIQUE: Le moteur a CRASHÉ sous la charge conjointe !"
          cat server_output.log; exit 1
        fi

        echo "=================================================="
        echo " 🛡️ TEST 6: Slow Connection / Timeout Resistance "
        echo "=================================================="
        START_TIME=$(date +%s)
        
        echo "Opening an inactive connection to trigger LITH's 3s timeout..."
        # On passe le sleep de la CI à 4 secondes pour s'aligner sur le timeout de 3s de LITH
        (echo -ne "POST /api/test HTTP/1.1\r\nContent-Length: 100\r\n\r\n"; sleep 4) | nc -w 5 localhost 8888
        
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "Connection lasted for: $DURATION seconds"

        if [ "$DURATION" -gt 4 ]; then
          echo "❌ CRITICAL FAULT: Server stayed open too long ($DURATIONs)!"
          cat server_output.log; kill -9 $SERVER_PID; exit 1
        else
          echo "✅ PASSED: Socket timeout successfully triggered in $DURATION seconds."
        fi

        # Fin globale
        echo "=================================================="
        echo " 🎉 All 7 advanced industrial tests passed successfully!"
        echo "=================================================="
        kill -9 $SERVER_PID