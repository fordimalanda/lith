name: Build and Package LITH

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.local_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            local_name: Linux
            asset_path: lith-linux.tar.gz
          - os: windows-latest
            local_name: Windows
            asset_path: lith-windows.zip
          - os: macos-latest
            local_name: Mac
            asset_path: lith-mac.tar.gz

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up GCC & OpenSSL (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: mingw-w64-x86_64-gcc mingw-w64-x86_64-openssl gcc make

    - name: Compile LITH (Linux & Mac)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p bin
        make

    # Compilation Windows utilisant le package natif OpenSSL de MSYS2 qui correspond à notre Makefile
    - name: Compile LITH (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        mkdir -p bin
        make OPENSSL_ROOT=/mingw64

    # Alignement de l'arborescence intermédiaire du build de test
    - name: Prepare Workspace Folder Structure
      shell: bash
      run: |
        mkdir -p dist/bin
        mkdir -p dist/public
        
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp bin/lith.exe dist/bin/lith.exe
          # Inclusion des DLL OpenSSL requises pour que l'exécutable Windows fonctionne partout
          cp /mingw64/bin/libssl-*.dll dist/bin/ 2>/dev/null || cp /c/OpenSSL-Win64/bin/libssl-*.dll dist/bin/ || true
          cp /mingw64/bin/libcrypto-*.dll dist/bin/ 2>/dev/null || cp /c/OpenSSL-Win64/bin/libcrypto-*.dll dist/bin/ || true
        else
          cp bin/lith dist/bin/lith
        fi
        
        if [ -f "lith.conf" ]; then cp lith.conf dist/lith.conf; fi
        if [ -f "public/index.html" ]; then cp public/index.html dist/public/index.html; fi

    - name: Package Windows Artifact (.zip)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        cd dist
        7z a ../lith-windows.zip bin/ public/ lith.conf

    - name: Package Linux Artifact (.tar.gz)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        cd dist
        tar -czf ../lith-linux.tar.gz bin/ public/ lith.conf

    - name: Package Mac Artifact (.tar.gz)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        cd dist
        tar -czf ../lith-mac.tar.gz bin/ public/ lith.conf

    - name: Upload Intermediate Platform Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.local_name }}-package
        path: ${{ matrix.asset_path }}
        retention-days: 1

  bundle:
    name: Bundle All Operational Binaries
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Create Consolidation Directory
      run: mkdir -p bundle_payload

    - name: Download Linux Binary Package
      uses: actions/download-artifact@v4
      with:
        name: Linux-package
        path: bundle_payload

    - name: Download Windows Binary Package
      uses: actions/download-artifact@v4
      with:
        name: Windows-package
        path: bundle_payload

    - name: Download Mac Binary Package
      uses: actions/download-artifact@v4
      with:
        name: Mac-package
        path: bundle_payload

    - name: Zip All Distribution Packages
      run: |
        zip -j lith-distribution.zip bundle_payload/*

    - name: Upload Final Consolidated Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lith-release-packages
        path: lith-distribution.zip