name: Release and Deploy LITH

on:
  push:
    tags:
      - 'v*'

jobs:
  release-assets:
    name: Build and Publish Release Assets
    runs-on: ${{ matrix.os }}
    
    permissions:
      contents: write
      
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform_suffix: linux-x64
            extension: tar.gz
          - os: windows-latest
            platform_suffix: windows-x64
            extension: zip
          - os: macos-latest
            platform_suffix: mac-x64
            extension: tar.gz

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up GCC (Windows)
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: mingw-w64-x86_64-gcc gcc make

    - name: Compile LITH (Linux & Mac)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p bin
        make

    - name: Compile LITH (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        mkdir -p bin
        make

    - name: Get Version from Tag
      id: get_version
      shell: bash
      run: |
        echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    # Génération de la structure demandée : bin/lith, public/index.html et lith.conf
    - name: Prepare Workspace Structure
      shell: bash
      run: |
        mkdir -p dist/bin
        mkdir -p dist/public
        
        # Copie de l'exécutable dans dist/bin/
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp bin/lith.exe dist/bin/lith.exe
        else
          cp bin/lith dist/bin/lith
        fi
        
        # Copie des fichiers d'accompagnement essentiels
        if [ -f "lith.conf" ]; then cp lith.conf dist/lith.conf; fi
        if [ -f "public/index.html" ]; then cp public/index.html dist/public/index.html; fi

    - name: Package Windows Artifact
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        cd dist
        7z a ../lith-windows-${{ steps.get_version.outputs.TAG_NAME }}-x64.zip bin/ public/ lith.conf

    - name: Package Linux Artifact
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        cd dist
        tar -czf ../lith-linux-${{ steps.get_version.outputs.TAG_NAME }}-x64.tar.gz bin/ public/ lith.conf

    - name: Package Mac Artifact
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        cd dist
        tar -czf ../lith-mac-${{ steps.get_version.outputs.TAG_NAME }}-x64.tar.gz bin/ public/ lith.conf

    - name: Upload Binary to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          lith-*.zip
          lith-*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}